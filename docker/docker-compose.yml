services:
  rag-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # ── 源码卷挂载（改代码秒级生效，无需重建）──
      - ../api:/app/api
      - ../rag_agent.py:/app/rag_agent.py
      - ../config_data.py:/app/config_data.py
      - ../file_parser.py:/app/file_parser.py
      - ../file_history_store.py:/app/file_history_store.py
      - ../knowledge_base.py:/app/knowledge_base.py
      - ../vector_stores.py:/app/vector_stores.py
      # ── 运行时数据（持久化）──
      - ../data/chroma_db:/app/data/chroma_db
      - ../data/chat_history:/app/data/chat_history
      - ../data/md5_admin.txt:/app/data/md5_admin.txt
      - ../data/md5_guest.txt:/app/data/md5_guest.txt
      - ../data/rate_limit.json:/app/data/rate_limit.json
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - GUEST_TOKEN=${GUEST_TOKEN}
      - RAG_MOCK_LLM=${RAG_MOCK_LLM:-0}
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000 --reload
    mem_limit: 1g
    user: "1000:1000"
    restart: unless-stopped
