version: '3.8'

services:
  rag-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ../data/chroma_db:/app/data/chroma_db
      - ../data/chat_history:/app/data/chat_history
      - ../data/md5.text:/app/data/md5.text
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
    mem_limit: 1g
    user: "1000:1000"
    restart: unless-stopped
