<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库管理 — yellowduck.top</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── 登录叠加层 ── */
  .login-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }
  .login-card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 36px 32px;
    width: 360px;
    max-width: 90vw;
    text-align: center;
  }
  .login-card h2 { font-size: 1.25rem; color: #f1f5f9; margin-bottom: 8px; }
  .login-card p { font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; }
  .login-card input[type="password"] {
    width: 100%; padding: 10px 14px;
    border-radius: 10px; border: 1px solid #475569;
    background: #0f172a; color: #e2e8f0;
    font-size: 0.9rem; outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .login-card input[type="password"]:focus { border-color: #2563eb; }
  .login-card button {
    width: 100%; padding: 10px 0;
    border-radius: 10px; border: none;
    background: #2563eb; color: #fff;
    font-size: 0.9rem; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
  }
  .login-card button:hover { background: #1d4ed8; }
  .login-error { color: #f87171; font-size: 0.8rem; margin-top: 12px; min-height: 20px; }

  /* ── 页面内容 ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap; gap: 10px;
  }
  header .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 1rem;
    color: #f1f5f9;
    text-decoration: none;
  }
  header .brand:hover { color: #facc15; }
  header nav { display: flex; gap: 8px; }
  header nav a {
    color: #94a3b8;
    text-decoration: none;
    font-size: 0.85rem;
    padding: 6px 12px;
    border-radius: 6px;
    transition: background 0.2s, color 0.2s;
  }
  header nav a:hover { background: #334155; color: #e2e8f0; }
  h2 { font-size: 1.2rem; color: #f1f5f9; margin-bottom: 16px; }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .upload-section input[type="file"] {
    display: block;
    margin-bottom: 12px;
    color: #94a3b8;
    font-size: 0.9rem;
  }
  .upload-section input[type="file"]::file-selector-button {
    background: #334155;
    color: #e2e8f0;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-right: 12px;
    font-size: 0.85rem;
  }
  .upload-section input[type="file"]::file-selector-button:hover { background: #475569; }
  .btn {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger { background: #991b1b; color: #fff; padding: 6px 12px; font-size: 0.8rem; }
  .btn-danger:hover { background: #7f1d1d; }
  .btn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
  .upload-status { margin-top: 12px; font-size: 0.85rem; }
  .upload-status.success { color: #4ade80; }
  .upload-status.error { color: #f87171; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155; }
  th { color: #94a3b8; font-weight: 500; font-size: 0.8rem; text-transform: uppercase; }
  td { color: #e2e8f0; }
  td.source { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:hover td { background: rgba(37,99,235,0.05); }
  .empty-table { text-align: center; color: #64748b; padding: 24px; }
  .loading { color: #64748b; }
  .supported-types { font-size: 0.75rem; color: #64748b; margin-top: 8px; }
</style>
</head>
<body>

<!-- ═══════════ 登录叠加层 ═══════════ -->
<div id="login-overlay" class="login-overlay">
  <div class="login-card">
    <h2>🔐 知识库管理</h2>
    <p>请输入密码以继续</p>
    <input type="password" id="password-input" placeholder="输入密码" onkeydown="if(event.key==='Enter')handleLogin()">
    <button onclick="handleLogin()">确认</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ═══════════ 页面头部 ═══════════ -->
<header>
  <a href="/" class="brand">🐤 yellowduck.top</a>
  <nav>
    <a href="/rag/">💬 对话</a>
    <a href="/">🏠 导航</a>
  </nav>
</header>

<h2>📁 知识库管理</h2>

<div class="card upload-section">
  <h3 style="font-size:0.95rem;margin-bottom:10px;color:#f1f5f9;">上传文档</h3>
  <input type="file" id="file-input" accept=".txt,.md,.pdf,.docx,.png,.jpg,.jpeg,.bmp,.tiff" multiple>
  <button class="btn btn-primary" id="upload-btn" onclick="uploadFiles()">上传到知识库</button>
  <div class="upload-status" id="upload-status"></div>
  <div class="supported-types">支持格式：TXT / MD / PDF / DOCX / PNG / JPG / BMP / TIFF</div>
</div>

<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
    <h3 style="font-size:0.95rem;color:#f1f5f9;margin:0;">文档列表</h3>
    <button class="btn btn-primary" style="padding:6px 14px;font-size:0.8rem;" onclick="loadDocuments()">刷新</button>
  </div>
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr><th>文档名称</th><th>上传时间</th><th>分块数</th><th>操作</th></tr>
      </thead>
      <tbody id="doc-table-body">
        <tr><td colspan="4" class="loading">加载中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
/* ────────── Auth ────────── */
var AUTH_STORAGE_KEY = 'rag_auth_token';

function getToken() {
  return localStorage.getItem(AUTH_STORAGE_KEY);
}
function setToken(token) {
  localStorage.setItem(AUTH_STORAGE_KEY, token);
}
function clearToken() {
  localStorage.removeItem(AUTH_STORAGE_KEY);
}
function checkAuth() {
  return !!getToken();
}
async function handleLogin() {
  var password = document.getElementById('password-input').value.trim();
  if (!password) return;
  setToken(password);
  try {
    var resp = await fetch('/rag/api/chat/sessions', {
      headers: { 'Authorization': 'Bearer ' + password }
    });
    if (resp.ok) {
      document.getElementById('login-overlay').style.display = 'none';
      loadDocuments();
    } else {
      clearToken();
      document.getElementById('login-error').textContent = '密码错误，请重试';
    }
  } catch(e) {
    clearToken();
    document.getElementById('login-error').textContent = '网络错误，请检查连接';
  }
}
function showLoginOverlay() {
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('password-input').value = '';
  document.getElementById('login-error').textContent = '';
}

/* ────────── DOM ────────── */
var uploadStatus = document.getElementById('upload-status');
var docTableBody = document.getElementById('doc-table-body');

function authHeaders() {
  return { 'Authorization': 'Bearer ' + getToken() };
}

async function uploadFiles() {
  if (!checkAuth()) { showLoginOverlay(); return; }

  var input = document.getElementById('file-input');
  var files = input.files;
  if (files.length === 0) {
    uploadStatus.className = 'upload-status error';
    uploadStatus.textContent = '请先选择文件';
    return;
  }

  var btn = document.getElementById('upload-btn');
  btn.disabled = true;
  uploadStatus.className = 'upload-status';
  uploadStatus.textContent = '上传中…';

  var successCount = 0, failCount = 0;
  for (var i = 0; i < files.length; i++) {
    var formData = new FormData();
    formData.append('file', files[i]);
    try {
      var resp = await fetch('/rag/api/knowledge-base/upload', {
        method: 'POST',
        body: formData,
        headers: authHeaders()
      });
      if (resp.ok) { successCount++; }
      else {
        if (resp.status === 401) { clearToken(); showLoginOverlay(); return; }
        failCount++;
      }
    } catch (err) {
      failCount++;
    }
  }

  if (failCount === 0) {
    uploadStatus.className = 'upload-status success';
    uploadStatus.textContent = '成功上传 ' + successCount + ' 个文件！';
  } else {
    uploadStatus.className = 'upload-status error';
    uploadStatus.textContent = '上传完成：' + successCount + ' 成功，' + failCount + ' 失败';
  }
  input.value = '';
  btn.disabled = false;
  loadDocuments();
}

async function loadDocuments() {
  if (!checkAuth()) { showLoginOverlay(); return; }

  docTableBody.innerHTML = '<tr><td colspan="4" class="loading">加载中…</td></tr>';
  try {
    var resp = await fetch('/rag/api/knowledge-base/documents', {
      headers: authHeaders()
    });
    if (resp.status === 401) { clearToken(); showLoginOverlay(); return; }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var docs = await resp.json();
    if (!docs || docs.length === 0) {
      docTableBody.innerHTML = '<tr><td colspan="4" class="empty-table">📭 暂无文档，上传你的第一份文件吧</td></tr>';
      return;
    }
    var html = '';
    for (var i = 0; i < docs.length; i++) {
      var d = docs[i];
      html += '<tr>';
      html += '<td class="source" title="' + escapeHtml(d.source) + '">' + escapeHtml(d.source) + '</td>';
      html += '<td>' + escapeHtml(d.create_time || '-') + '</td>';
      html += '<td>' + (d.chunk_count || 0) + '</td>';
      html += '<td><button class="btn btn-danger" onclick="deleteDoc(\'' + escapeHtml(d.source).replace(/'/g, "\\'") + '\')">删除</button></td>';
      html += '</tr>';
    }
    docTableBody.innerHTML = html;
  } catch (err) {
    docTableBody.innerHTML = '<tr><td colspan="4" class="empty-table">⚠️ 加载失败：' + escapeHtml(err.message) + '</td></tr>';
  }
}

async function deleteDoc(source) {
  if (!checkAuth()) { showLoginOverlay(); return; }
  if (!confirm('确认删除 "' + source + '"？此操作不可撤销。')) return;
  try {
    var resp = await fetch('/rag/api/knowledge-base/documents/' + encodeURIComponent(source), {
      method: 'DELETE',
      headers: authHeaders()
    });
    if (resp.status === 401) { clearToken(); showLoginOverlay(); return; }
    if (resp.ok) { loadDocuments(); }
    else { alert('删除失败：HTTP ' + resp.status); }
  } catch (err) {
    alert('删除失败：' + err.message);
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ────────── 初始化 ────────── */
if (checkAuth()) {
  document.getElementById('login-overlay').style.display = 'none';
  loadDocuments();
} else {
  showLoginOverlay();
}
</script>

</body>
</html>
